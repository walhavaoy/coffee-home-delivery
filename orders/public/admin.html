<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 50rem; margin: 2rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    select { padding: 0.25rem; }
    .status-badge { padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.875rem; }
    h1 { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>Orders Admin</h1>
  <p>Manage coffee delivery orders.</p>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Items</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="orders-body"></tbody>
  </table>

  <script>
    const STATUSES = ['pending','confirmed','preparing','delivering','delivered','cancelled'];

    async function loadOrders() {
      const res = await fetch('/api/orders');
      const data = await res.json();
      const tbody = document.getElementById('orders-body');
      tbody.innerHTML = '';
      for (const order of data.orders) {
        const tr = document.createElement('tr');
        const options = STATUSES.map(s =>
          '<option value="' + s + '"' + (s === order.status ? ' selected' : '') + '>' + s + '</option>'
        ).join('');
        tr.innerHTML =
          '<td>' + order.id.slice(0, 8) + '</td>' +
          '<td>' + escapeHtml(order.customerName) + '</td>' +
          '<td>' + escapeHtml(order.items.join(', ')) + '</td>' +
          '<td><span class="status-badge">' + escapeHtml(order.status) + '</span></td>' +
          '<td><select data-id="' + order.id + '">' + options + '</select></td>';
        tbody.appendChild(tr);
      }
      document.querySelectorAll('select[data-id]').forEach(function(sel) {
        sel.addEventListener('change', function() { updateStatus(this.dataset.id, this.value); });
      });
    }

    async function updateStatus(id, status) {
      await fetch('/api/orders/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: status })
      });
      loadOrders();
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadOrders();
  </script>
</body>
</html>
